<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AppLeap RAG</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ─────────────────────────────────── */
  header {
    background: #111;
    color: #fff;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  #health-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #555;
    display: inline-block;
    margin-left: 10px;
  }
  #health-dot.ok { background: #22c55e; }
  #health-dot.err { background: #ef4444; }

  /* ── Layout ─────────────────────────────────── */
  .container {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar (upload) ───────────────────────── */
  .sidebar {
    width: 320px;
    background: #fff;
    border-right: 1px solid #e0e0e0;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar h2 {
    font-size: 14px;
    font-weight: 600;
    padding: 16px 16px 8px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .drop-zone {
    margin: 8px 16px;
    padding: 32px 16px;
    border: 2px dashed #ccc;
    border-radius: 8px;
    text-align: center;
    color: #888;
    font-size: 14px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: #111;
    background: #fafafa;
  }
  .drop-zone input { display: none; }

  .file-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px;
  }
  .file-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    margin-bottom: 6px;
    background: #f9f9f9;
    border-radius: 6px;
    font-size: 13px;
  }
  .file-item .name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-right: 8px;
  }
  .file-item .status {
    font-size: 12px;
    font-weight: 500;
    flex-shrink: 0;
  }
  .file-item .status.uploading { color: #f59e0b; }
  .file-item .status.done { color: #22c55e; }
  .file-item .status.error { color: #ef4444; }
  .file-item .chunks {
    font-size: 11px;
    color: #888;
    margin-left: 6px;
    flex-shrink: 0;
  }

  /* ── Chat area ──────────────────────────────── */
  .chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }
  .message {
    max-width: 720px;
    margin-bottom: 20px;
  }
  .message.user {
    margin-left: auto;
  }
  .message .role {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    color: #888;
  }
  .message.user .role { text-align: right; }
  .message .bubble {
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .message.user .bubble {
    background: #111;
    color: #fff;
    border-bottom-right-radius: 2px;
  }
  .message.assistant .bubble {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-bottom-left-radius: 2px;
  }
  .message .sources {
    margin-top: 8px;
    font-size: 12px;
    color: #888;
  }
  .message .sources summary {
    cursor: pointer;
    user-select: none;
  }
  .message .sources pre {
    margin-top: 4px;
    font-size: 11px;
    background: #f5f5f5;
    padding: 8px;
    border-radius: 4px;
    overflow-x: auto;
    white-space: pre-wrap;
  }

  .thinking {
    padding: 12px 16px;
    color: #888;
    font-size: 14px;
    font-style: italic;
    display: none;
  }
  .thinking.visible { display: block; }

  /* ── Input bar ──────────────────────────────── */
  .input-bar {
    padding: 16px 24px;
    background: #fff;
    border-top: 1px solid #e0e0e0;
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }
  .input-bar input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-bar input:focus { border-color: #111; }
  .input-bar button {
    padding: 12px 24px;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .input-bar button:hover { background: #333; }
  .input-bar button:disabled { background: #999; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;">
    <h1>AppLeap RAG</h1>
    <span id="health-dot" title="Checking..."></span>
  </div>
  <span style="font-size:12px;color:#888;">Internal Testing</span>
</header>

<div class="container">
  <!-- Sidebar: file upload -->
  <div class="sidebar">
    <h2>Upload Documents</h2>
    <div class="drop-zone" id="drop-zone">
      <p>Drop files here or click to browse</p>
      <p style="margin-top:6px;font-size:12px;">PDF, DOCX, PPTX, Markdown, HTML, TXT, CSV, JSON, XML</p>
      <input type="file" id="file-input" multiple
        accept=".pdf,.docx,.doc,.pptx,.ppt,.xlsx,.xls,.md,.txt,.html,.htm,.rst,.csv,.json,.xml">
    </div>
    <h2>Uploaded Files</h2>
    <div class="file-list" id="file-list"></div>
  </div>

  <!-- Chat -->
  <div class="chat">
    <div class="messages" id="messages">
      <div class="message assistant">
        <div class="role">AppLeap</div>
        <div class="bubble">Upload some documents using the panel on the left, then ask me anything about them.</div>
      </div>
    </div>
    <div class="thinking" id="thinking">Thinking...</div>
    <div class="input-bar">
      <input type="text" id="query-input" placeholder="Ask a question about your documents..." autofocus>
      <button id="send-btn">Send</button>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;

// ── Health check ──────────────────────────────
async function checkHealth() {
  const dot = document.getElementById("health-dot");
  try {
    const r = await fetch(`${API}/health`);
    if (r.ok) { dot.className = "ok"; dot.title = "Backend connected"; }
    else { dot.className = "err"; dot.title = "Backend error"; }
  } catch {
    dot.className = "err";
    dot.title = "Backend unreachable";
  }
}
checkHealth();
setInterval(checkHealth, 30000);

// ── File upload ───────────────────────────────
const dropZone = document.getElementById("drop-zone");
const fileInput = document.getElementById("file-input");
const fileList = document.getElementById("file-list");

dropZone.addEventListener("click", () => fileInput.click());
dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropZone.classList.remove("dragover");
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener("change", () => {
  handleFiles(fileInput.files);
  fileInput.value = "";
});

function handleFiles(files) {
  for (const file of files) {
    uploadFile(file);
  }
}

async function uploadFile(file) {
  const item = document.createElement("div");
  item.className = "file-item";
  item.innerHTML = `
    <span class="name" title="${file.name}">${file.name}</span>
    <span class="status uploading">Uploading...</span>
  `;
  fileList.prepend(item);

  const formData = new FormData();
  formData.append("file", file);
  formData.append("source", "upload");
  formData.append("metadata_json", JSON.stringify({ uploaded_by: "test_ui" }));

  try {
    const r = await fetch(`${API}/ingest/file`, { method: "POST", body: formData });
    if (!r.ok) {
      const err = await r.json().catch(() => ({ detail: r.statusText }));
      item.querySelector(".status").className = "status error";
      item.querySelector(".status").textContent = err.detail || "Failed";
      return;
    }
    const data = await r.json();
    item.querySelector(".status").className = "status done";
    item.querySelector(".status").textContent = "Done";
    item.innerHTML += `<span class="chunks">${data.chunks_stored} chunks</span>`;
  } catch (e) {
    item.querySelector(".status").className = "status error";
    item.querySelector(".status").textContent = "Network error";
  }
}

// ── Chat ──────────────────────────────────────
const messagesEl = document.getElementById("messages");
const queryInput = document.getElementById("query-input");
const sendBtn = document.getElementById("send-btn");
const thinkingEl = document.getElementById("thinking");

sendBtn.addEventListener("click", sendQuery);
queryInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendQuery(); }
});

async function sendQuery() {
  const question = queryInput.value.trim();
  if (!question) return;

  queryInput.value = "";
  appendMessage("user", question);
  sendBtn.disabled = true;
  thinkingEl.classList.add("visible");
  messagesEl.scrollTop = messagesEl.scrollHeight;

  try {
    const r = await fetch(`${API}/query`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question }),
    });

    if (!r.ok) {
      const err = await r.json().catch(() => ({ detail: r.statusText }));
      appendMessage("assistant", `Error: ${err.detail || r.statusText}`);
      return;
    }

    const data = await r.json();
    appendMessage("assistant", data.answer, data.sources);
  } catch (e) {
    appendMessage("assistant", `Network error: ${e.message}`);
  } finally {
    sendBtn.disabled = false;
    thinkingEl.classList.remove("visible");
  }
}

function appendMessage(role, text, sources) {
  const div = document.createElement("div");
  div.className = `message ${role}`;

  let html = `<div class="role">${role === "user" ? "You" : "AppLeap"}</div>`;
  html += `<div class="bubble">${escapeHtml(text)}</div>`;

  if (sources && sources.length > 0) {
    const sourceText = sources.map((s, i) =>
      `[${i + 1}] Chunk #${s.chunk_index}\n${s.content_preview}`
    ).join("\n\n");
    html += `<details class="sources"><summary>${sources.length} source(s) used</summary><pre>${escapeHtml(sourceText)}</pre></details>`;
  }

  div.innerHTML = html;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(text) {
  const d = document.createElement("div");
  d.textContent = text;
  return d.innerHTML;
}
</script>
</body>
</html>
