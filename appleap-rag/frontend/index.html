<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AppLeap RAG</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ─────────────────────────────────── */
  header {
    background: #111;
    color: #fff;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  #health-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #555;
    display: inline-block;
    margin-left: 10px;
  }
  #health-dot.ok { background: #22c55e; }
  #health-dot.err { background: #ef4444; }

  /* ── Layout ─────────────────────────────────── */
  .container {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ────────────────────────────────── */
  .sidebar {
    width: 320px;
    background: #fff;
    border-right: 1px solid #e0e0e0;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .sidebar-tabs {
    display: flex;
    border-bottom: 1px solid #e0e0e0;
    flex-shrink: 0;
  }
  .sidebar-tabs button {
    flex: 1;
    padding: 12px 0;
    border: none;
    background: #f9f9f9;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #888;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .sidebar-tabs button.active {
    background: #fff;
    color: #111;
    border-bottom-color: #111;
  }

  .sidebar-panel {
    display: none;
    flex: 1;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-panel.active {
    display: flex;
  }

  /* ── Chats panel ────────────────────────────── */
  .new-chat-btn {
    margin: 12px 16px;
    padding: 10px 16px;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .new-chat-btn:hover { background: #333; }

  .chat-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 16px;
  }

  .chat-item {
    padding: 12px;
    margin-bottom: 4px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .chat-item:hover { background: #f5f5f5; }
  .chat-item.active { background: #eee; }
  .chat-item .chat-title {
    font-size: 14px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding-right: 28px;
  }
  .chat-item .chat-time {
    font-size: 11px;
    color: #888;
    margin-top: 2px;
  }
  .chat-item .chat-delete {
    position: absolute;
    top: 10px;
    right: 8px;
    width: 24px;
    height: 24px;
    border: none;
    background: none;
    color: #bbb;
    font-size: 16px;
    cursor: pointer;
    border-radius: 4px;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .chat-item:hover .chat-delete { display: flex; }
  .chat-item .chat-delete:hover { background: #e0e0e0; color: #ef4444; }

  /* ── Upload panel ───────────────────────────── */
  .sidebar h2 {
    font-size: 14px;
    font-weight: 600;
    padding: 16px 16px 8px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .drop-zone {
    margin: 8px 16px;
    padding: 32px 16px;
    border: 2px dashed #ccc;
    border-radius: 8px;
    text-align: center;
    color: #888;
    font-size: 14px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: #111;
    background: #fafafa;
  }
  .drop-zone input { display: none; }

  .file-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px;
  }
  .file-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    margin-bottom: 6px;
    background: #f9f9f9;
    border-radius: 6px;
    font-size: 13px;
  }
  .file-item .name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-right: 8px;
  }
  .file-item .status {
    font-size: 12px;
    font-weight: 500;
    flex-shrink: 0;
  }
  .file-item .status.uploading { color: #f59e0b; }
  .file-item .status.done { color: #22c55e; }
  .file-item .status.error { color: #ef4444; }
  .file-item .chunks {
    font-size: 11px;
    color: #888;
    margin-left: 6px;
    flex-shrink: 0;
  }

  /* ── Chat area ──────────────────────────────── */
  .chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }
  .message {
    max-width: 720px;
    margin-bottom: 20px;
  }
  .message.user {
    margin-left: auto;
  }
  .message .role {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    color: #888;
  }
  .message.user .role { text-align: right; }
  .message .bubble {
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .message.user .bubble {
    background: #111;
    color: #fff;
    border-bottom-right-radius: 2px;
  }
  .message.assistant .bubble {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-bottom-left-radius: 2px;
  }
  .message .sources {
    margin-top: 8px;
    font-size: 12px;
    color: #888;
  }
  .message .sources summary {
    cursor: pointer;
    user-select: none;
  }
  .message .sources pre {
    margin-top: 4px;
    font-size: 11px;
    background: #f5f5f5;
    padding: 8px;
    border-radius: 4px;
    overflow-x: auto;
    white-space: pre-wrap;
  }

  .thinking {
    padding: 12px 16px;
    color: #888;
    font-size: 14px;
    font-style: italic;
    display: none;
  }
  .thinking.visible { display: block; }

  /* ── Input bar ──────────────────────────────── */
  .input-bar {
    padding: 16px 24px;
    background: #fff;
    border-top: 1px solid #e0e0e0;
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }
  .input-bar input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-bar input:focus { border-color: #111; }
  .input-bar button {
    padding: 12px 24px;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .input-bar button:hover { background: #333; }
  .input-bar button:disabled { background: #999; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;">
    <h1>AppLeap RAG</h1>
    <span id="health-dot" title="Checking..."></span>
  </div>
  <span style="font-size:12px;color:#888;">Internal Testing</span>
</header>

<div class="container">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-tabs">
      <button class="active" data-tab="chats">Chats</button>
      <button data-tab="upload">Upload</button>
    </div>

    <!-- Chats panel -->
    <div class="sidebar-panel active" id="panel-chats">
      <button class="new-chat-btn" id="new-chat-btn">+ New Chat</button>
      <div class="chat-list" id="chat-list"></div>
    </div>

    <!-- Upload panel -->
    <div class="sidebar-panel" id="panel-upload">
      <h2>Upload Documents</h2>
      <div class="drop-zone" id="drop-zone">
        <p>Drop files here or click to browse</p>
        <p style="margin-top:6px;font-size:12px;">PDF, DOCX, PPTX, Markdown, HTML, TXT, CSV, JSON, XML</p>
        <input type="file" id="file-input" multiple
          accept=".pdf,.docx,.doc,.pptx,.ppt,.xlsx,.xls,.md,.txt,.html,.htm,.rst,.csv,.json,.xml">
      </div>
      <h2>Uploaded Files</h2>
      <div class="file-list" id="file-list"></div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat">
    <div class="messages" id="messages">
      <div class="message assistant">
        <div class="role">AppLeap</div>
        <div class="bubble">Upload some documents using the Upload tab, then ask me anything about them.</div>
      </div>
    </div>
    <div class="thinking" id="thinking">Thinking...</div>
    <div class="input-bar">
      <input type="text" id="query-input" placeholder="Ask a question about your documents..." autofocus>
      <button id="send-btn">Send</button>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;

// ── State ────────────────────────────────────
let currentConversationId = null;

// ── Sidebar tabs ─────────────────────────────
document.querySelectorAll(".sidebar-tabs button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".sidebar-tabs button").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".sidebar-panel").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(`panel-${btn.dataset.tab}`).classList.add("active");
  });
});

// ── Health check ─────────────────────────────
async function checkHealth() {
  const dot = document.getElementById("health-dot");
  try {
    const r = await fetch(`${API}/health`);
    if (r.ok) { dot.className = "ok"; dot.title = "Backend connected"; }
    else { dot.className = "err"; dot.title = "Backend error"; }
  } catch {
    dot.className = "err";
    dot.title = "Backend unreachable";
  }
}
checkHealth();
setInterval(checkHealth, 30000);

// ── Conversation management ──────────────────

async function loadConversations() {
  const list = document.getElementById("chat-list");
  try {
    const r = await fetch(`${API}/conversations`);
    if (!r.ok) return;
    const conversations = await r.json();

    list.innerHTML = "";
    for (const conv of conversations) {
      const item = document.createElement("div");
      item.className = `chat-item${conv.id === currentConversationId ? " active" : ""}`;
      item.dataset.id = conv.id;

      const time = new Date(conv.updated_at);
      const timeStr = formatTime(time);

      item.innerHTML = `
        <div class="chat-title" title="${escapeHtml(conv.title)}">${escapeHtml(conv.title)}</div>
        <div class="chat-time">${timeStr} &middot; ${conv.message_count} messages</div>
        <button class="chat-delete" title="Delete">&times;</button>
      `;

      item.addEventListener("click", (e) => {
        if (e.target.closest(".chat-delete")) return;
        openConversation(conv.id);
      });

      item.querySelector(".chat-delete").addEventListener("click", async (e) => {
        e.stopPropagation();
        if (!confirm("Delete this conversation?")) return;
        await fetch(`${API}/conversations/${conv.id}`, { method: "DELETE" });
        if (currentConversationId === conv.id) {
          startNewChat();
        }
        loadConversations();
      });

      list.appendChild(item);
    }
  } catch (e) {
    console.error("Failed to load conversations:", e);
  }
}

async function openConversation(convId) {
  try {
    const r = await fetch(`${API}/conversations/${convId}`);
    if (!r.ok) return;
    const conv = await r.json();

    currentConversationId = convId;
    const messagesEl = document.getElementById("messages");
    messagesEl.innerHTML = "";

    for (const msg of conv.messages) {
      appendMessage(msg.role, msg.content, msg.sources);
    }

    if (conv.messages.length === 0) {
      appendMessage("assistant", "Upload some documents using the Upload tab, then ask me anything about them.");
    }

    // Highlight active chat in sidebar
    document.querySelectorAll(".chat-item").forEach(item => {
      item.classList.toggle("active", item.dataset.id === convId);
    });

    messagesEl.scrollTop = messagesEl.scrollHeight;
  } catch (e) {
    console.error("Failed to open conversation:", e);
  }
}

function startNewChat() {
  currentConversationId = null;
  const messagesEl = document.getElementById("messages");
  messagesEl.innerHTML = `
    <div class="message assistant">
      <div class="role">AppLeap</div>
      <div class="bubble">Upload some documents using the Upload tab, then ask me anything about them.</div>
    </div>
  `;
  document.querySelectorAll(".chat-item").forEach(item => item.classList.remove("active"));
  document.getElementById("query-input").focus();
}

document.getElementById("new-chat-btn").addEventListener("click", startNewChat);

function formatTime(date) {
  const now = new Date();
  const diffMs = now - date;
  const diffMins = Math.floor(diffMs / 60000);
  const diffHours = Math.floor(diffMs / 3600000);
  const diffDays = Math.floor(diffMs / 86400000);

  if (diffMins < 1) return "Just now";
  if (diffMins < 60) return `${diffMins}m ago`;
  if (diffHours < 24) return `${diffHours}h ago`;
  if (diffDays < 7) return `${diffDays}d ago`;
  return date.toLocaleDateString();
}

// Load conversations on page load
loadConversations();

// ── File upload ──────────────────────────────
const dropZone = document.getElementById("drop-zone");
const fileInput = document.getElementById("file-input");
const fileList = document.getElementById("file-list");

dropZone.addEventListener("click", () => fileInput.click());
dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropZone.classList.remove("dragover");
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener("change", () => {
  handleFiles(fileInput.files);
  fileInput.value = "";
});

function handleFiles(files) {
  for (const file of files) {
    uploadFile(file);
  }
}

async function uploadFile(file) {
  const item = document.createElement("div");
  item.className = "file-item";
  item.innerHTML = `
    <span class="name" title="${file.name}">${file.name}</span>
    <span class="status uploading">Uploading...</span>
  `;
  fileList.prepend(item);

  const formData = new FormData();
  formData.append("file", file);
  formData.append("source", "upload");
  formData.append("metadata_json", JSON.stringify({ uploaded_by: "test_ui" }));

  try {
    const r = await fetch(`${API}/ingest/file`, { method: "POST", body: formData });
    if (!r.ok) {
      const err = await r.json().catch(() => ({ detail: r.statusText }));
      item.querySelector(".status").className = "status error";
      item.querySelector(".status").textContent = err.detail || "Failed";
      return;
    }
    const data = await r.json();
    item.querySelector(".status").className = "status done";
    item.querySelector(".status").textContent = "Done";
    item.innerHTML += `<span class="chunks">${data.chunks_stored} chunks</span>`;
  } catch (e) {
    item.querySelector(".status").className = "status error";
    item.querySelector(".status").textContent = "Network error";
  }
}

// ── Chat ─────────────────────────────────────
const messagesEl = document.getElementById("messages");
const queryInput = document.getElementById("query-input");
const sendBtn = document.getElementById("send-btn");
const thinkingEl = document.getElementById("thinking");

sendBtn.addEventListener("click", sendQuery);
queryInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendQuery(); }
});

async function sendQuery() {
  const question = queryInput.value.trim();
  if (!question) return;

  queryInput.value = "";
  appendMessage("user", question);
  sendBtn.disabled = true;
  thinkingEl.classList.add("visible");
  messagesEl.scrollTop = messagesEl.scrollHeight;

  try {
    const body = { question };
    if (currentConversationId) {
      body.conversation_id = currentConversationId;
    }

    const r = await fetch(`${API}/query`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });

    if (!r.ok) {
      const err = await r.json().catch(() => ({ detail: r.statusText }));
      appendMessage("assistant", `Error: ${err.detail || r.statusText}`);
      return;
    }

    const data = await r.json();

    // Track the conversation ID (auto-created on first query)
    if (data.conversation_id) {
      currentConversationId = data.conversation_id;
      loadConversations();
    }

    appendMessage("assistant", data.answer, data.sources);
  } catch (e) {
    appendMessage("assistant", `Network error: ${e.message}`);
  } finally {
    sendBtn.disabled = false;
    thinkingEl.classList.remove("visible");
  }
}

function appendMessage(role, text, sources) {
  const div = document.createElement("div");
  div.className = `message ${role}`;

  let html = `<div class="role">${role === "user" ? "You" : "AppLeap"}</div>`;
  html += `<div class="bubble">${escapeHtml(text)}</div>`;

  if (sources && sources.length > 0) {
    const sourceText = sources.map((s, i) =>
      `[${i + 1}] Chunk #${s.chunk_index}\n${s.content_preview}`
    ).join("\n\n");
    html += `<details class="sources"><summary>${sources.length} source(s) used</summary><pre>${escapeHtml(sourceText)}</pre></details>`;
  }

  div.innerHTML = html;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(text) {
  const d = document.createElement("div");
  d.textContent = text;
  return d.innerHTML;
}
</script>
</body>
</html>
